services:
  - type: web
    name: workflow-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://workflow-murex-beta.vercel.app
      - key: API_URL
        value: https://workflow-3gbs.onrender.com
      - key: FRONTEND_URL
        value: https://workflow-murex-beta.vercel.app
